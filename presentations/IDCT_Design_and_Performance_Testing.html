<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cooling Tower Fundamentals: IDCT Design and Performance Testing — Engineering Presentation for NTPC">
  <title>Cooling Tower Fundamentals — IDCT Design &amp; Performance Testing</title>

  <!--
  ╔══════════════════════════════════════════════════════════════════════════╗
  ║  IDCT Design and Performance Testing — Portable HTML Presentation       ║
  ║  No external dependencies. Open in any modern browser.                  ║
  ║  Navigate: ← → Arrow keys · Space · Buttons · Dot nav                  ║
  ╚══════════════════════════════════════════════════════════════════════════╝
  -->

  <style>
    /* ═══════════════════════════════════════════════════════════════════
       MODULE 1 · RESET & BASE
       ═══════════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui,
                   'Helvetica Neue', Arial, sans-serif;
      line-height: 1.55;
      background: var(--stage);
      color: var(--text-1);
      height: 100vh;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 2 · DESIGN TOKENS
       ═══════════════════════════════════════════════════════════════════ */
    :root {
      /* Stage (the area behind the slide) */
      --stage:          #DDE3EE;

      /* Slide surface */
      --slide-bg:       #FFFFFF;
      --slide-max-w:    920px;
      --slide-radius:   10px;

      /* Navigation chrome */
      --chrome:         #1A2332;
      --chrome-border:  rgba(255,255,255,0.07);
      --chrome-text:    #94A3B8;

      /* Text scale */
      --text-1:  #0F172A;
      --text-2:  #334155;
      --text-3:  #64748B;
      --text-4:  #94A3B8;

      /* Accent */
      --accent:         #2563EB;
      --accent-bg:      #EFF6FF;
      --accent-border:  #BFDBFE;

      /* Structural */
      --border:     #E2E8F0;
      --border-md:  #CBD5E1;
      --fill-xs:    #F8FAFC;
      --fill-sm:    #F1F5F9;
      --fill-md:    #E2E8F0;

      /* Semantic tones — light mode */
      --info:           #2563EB;
      --info-bg:        #EFF6FF;
      --info-border:    #BFDBFE;
      --info-text:      #1D4ED8;

      --success:        #059669;
      --success-bg:     #ECFDF5;
      --success-border: #A7F3D0;
      --success-text:   #065F46;

      --warning:        #D97706;
      --warning-bg:     #FFFBEB;
      --warning-border: #FDE68A;
      --warning-text:   #92400E;

      --danger:         #DC2626;
      --danger-bg:      #FEF2F2;
      --danger-border:  #FECACA;
      --danger-text:    #991B1B;

      --neutral:        #475569;
      --neutral-bg:     #F1F5F9;
      --neutral-border: #CBD5E1;
      --neutral-text:   #334155;

      /* Chart palette */
      --c1: #3B82F6;
      --c2: #10B981;
      --c3: #F59E0B;
      --c4: #EF4444;
      --c5: #8B5CF6;
      --c6: #14B8A6;
      --c7: #EC4899;

      /* Radii */
      --r-sm: 4px;
      --r-md: 6px;
      --r-lg: 8px;
      --r-xl: 12px;
    }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 3 · SHELL — Flex column, full viewport
       ═══════════════════════════════════════════════════════════════════ */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 4 · TOP BAR — Dark chrome
       ═══════════════════════════════════════════════════════════════════ */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 40px;
      background: var(--chrome);
      border-bottom: 1px solid var(--chrome-border);
      flex-shrink: 0;
    }
    .top-bar-counter {
      font-size: 11.5px;
      color: var(--chrome-text);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    /* Top bar pill variants — visible on dark chrome */
    #part-badge.pill-info    { background: rgba(59,130,246,0.22);  color: #93C5FD; border-color: rgba(59,130,246,0.4); }
    #part-badge.pill-success { background: rgba(16,185,129,0.22);  color: #6EE7B7; border-color: rgba(16,185,129,0.4); }
    #part-badge.pill-warning { background: rgba(245,158,11,0.22);  color: #FCD34D; border-color: rgba(245,158,11,0.4); }
    #part-badge.pill-neutral { background: rgba(100,116,139,0.2);  color: #94A3B8; border-color: rgba(100,116,139,0.35); }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 5 · PROGRESS BAR
       ═══════════════════════════════════════════════════════════════════ */
    .progress-track {
      height: 3px;
      background: rgba(37,99,235,0.15);
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.32s ease;
      will-change: width;
    }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 6 · STAGE — The visible background behind the slide
       ═══════════════════════════════════════════════════════════════════ */
    .slides-container {
      flex: 1;
      background: var(--stage);
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 20px 16px;
    }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 7 · SLIDE CARD — White constrained-width card
       ═══════════════════════════════════════════════════════════════════ */
    .slide {
      display: none;
      width: 100%;
      max-width: var(--slide-max-w);
      background: var(--slide-bg);
      border: 1px solid var(--border);
      border-radius: var(--slide-radius);
      box-shadow: 0 1px 3px rgba(15,23,42,0.06), 0 6px 18px rgba(15,23,42,0.05);
      min-height: calc(100vh - 130px);
      padding: 36px 44px 32px;
    }
    .slide.active {
      display: block;
      animation: slideIn 0.18s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 8 · BOTTOM NAV — Dark chrome
       ═══════════════════════════════════════════════════════════════════ */
    .bottom-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 46px;
      background: var(--chrome);
      border-top: 1px solid var(--chrome-border);
      flex-shrink: 0;
      gap: 16px;
    }
    .nav-btn {
      background: rgba(255,255,255,0.07);
      color: #CBD5E1;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--r-md);
      padding: 5px 16px;
      font-size: 12.5px;
      cursor: pointer;
      transition: background 0.14s, color 0.14s;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.13);
      color: #F1F5F9;
    }
    .nav-btn:disabled { opacity: 0.28; cursor: default; }
    .dot-nav {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .dot {
      height: 7px; width: 7px;
      border-radius: 4px;
      background: rgba(255,255,255,0.18);
      cursor: pointer;
      transition: all 0.22s ease;
    }
    .dot.active { width: 20px; background: var(--accent); }
    .dot:hover:not(.active) { background: rgba(255,255,255,0.3); }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 9 · TYPOGRAPHY
       ═══════════════════════════════════════════════════════════════════ */
    .h1 {
      font-size: 22px; font-weight: 700;
      color: var(--text-1); line-height: 1.25;
      margin-bottom: 5px; letter-spacing: -0.01em;
    }
    .h2 {
      font-size: 15px; font-weight: 600;
      color: var(--text-1); margin-bottom: 8px; margin-top: 4px;
    }
    .slide-intro {
      font-size: 13px; color: var(--text-3); line-height: 1.65;
      margin-bottom: 18px; max-width: 780px;
    }
    .t-sm   { font-size: 12.5px; }
    .t-xs   { font-size: 11.5px; }
    .t-2nd  { color: var(--text-2); }
    .t-3rd  { color: var(--text-3); }
    .t-4th  { color: var(--text-4); }
    .t-acc  { color: var(--accent); }
    .t-suc  { color: var(--success); }
    .t-wrn  { color: var(--warning); }
    .t-dng  { color: var(--danger); }
    .t-inf  { color: var(--info); }
    .fw-sb  { font-weight: 600; }
    .fw-b   { font-weight: 700; }
    .lh-6   { line-height: 1.6; }
    hr.div  { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 10 · PILL / BADGE
       ═══════════════════════════════════════════════════════════════════ */
    .pill {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 99px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.025em; white-space: nowrap; border: 1px solid;
    }
    /* Light mode pills — used inside slide content */
    .pill-info    { background: var(--info-bg);    color: var(--info-text);    border-color: var(--info-border); }
    .pill-success { background: var(--success-bg); color: var(--success-text); border-color: var(--success-border); }
    .pill-warning { background: var(--warning-bg); color: var(--warning-text); border-color: var(--warning-border); }
    .pill-danger  { background: var(--danger-bg);  color: var(--danger-text);  border-color: var(--danger-border); }
    .pill-neutral { background: var(--neutral-bg); color: var(--neutral-text); border-color: var(--neutral-border); }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 11 · CARD
       ═══════════════════════════════════════════════════════════════════ */
    .card {
      background: var(--slide-bg);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .card-hd {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 13px; border-bottom: 1px solid var(--border);
      font-size: 11.5px; font-weight: 600; color: var(--text-3);
      background: var(--fill-xs);
    }
    .card-bd { padding: 13px 13px; }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 12 · TABLE
       ═══════════════════════════════════════════════════════════════════ */
    .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
    .tbl th {
      background: var(--fill-sm); color: var(--text-3); font-weight: 600;
      padding: 7px 12px; text-align: left; border-bottom: 1px solid var(--border-md);
      font-size: 11.5px; white-space: nowrap;
    }
    .tbl td {
      padding: 6.5px 12px; color: var(--text-2); border-bottom: 1px solid var(--border);
      vertical-align: top; line-height: 1.5;
    }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:nth-child(even) td { background: var(--fill-xs); }
    .tbl .row-wrn td { background: var(--warning-bg) !important; }
    .tbl .row-dng td { background: var(--danger-bg)  !important; }
    .tbl .row-suc td { background: var(--success-bg) !important; }
    .tbl-framed { border: 1px solid var(--border-md); border-radius: var(--r-md); overflow: hidden; }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 13 · CALLOUT
       ═══════════════════════════════════════════════════════════════════ */
    .callout {
      padding: 11px 14px; border-radius: var(--r-md); border-left: 3px solid;
      font-size: 12.5px; line-height: 1.58;
    }
    .callout-title { font-weight: 600; font-size: 12px; margin-bottom: 4px; }
    .callout-info    { background: var(--info-bg);    border-color: var(--info);    color: var(--text-2); }
    .callout-info    .callout-title { color: var(--info-text); }
    .callout-success { background: var(--success-bg); border-color: var(--success); color: var(--text-2); }
    .callout-success .callout-title { color: var(--success-text); }
    .callout-warning { background: var(--warning-bg); border-color: var(--warning); color: var(--text-2); }
    .callout-warning .callout-title { color: var(--warning-text); }
    .callout-danger  { background: var(--danger-bg);  border-color: var(--danger);  color: var(--text-2); }
    .callout-danger  .callout-title { color: var(--danger-text); }
    .callout-neutral { background: var(--neutral-bg); border-color: var(--neutral-border); color: var(--text-2); }
    .callout-neutral .callout-title { color: var(--neutral); }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 14 · STAT
       ═══════════════════════════════════════════════════════════════════ */
    .stat { text-align: center; padding: 11px 8px; }
    .stat-val { font-size: 19px; font-weight: 700; line-height: 1.15; margin-bottom: 4px; }
    .stat-lbl { font-size: 11px; color: var(--text-4); line-height: 1.3; }
    .sv-primary { color: var(--text-1); }
    .sv-success { color: var(--success); }
    .sv-warning { color: var(--warning); }
    .sv-danger  { color: var(--danger); }
    .sv-info    { color: var(--info); }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 15 · EQUATION
       ═══════════════════════════════════════════════════════════════════ */
    .eq {
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
      font-size: 12.5px; padding: 11px 16px;
      background: #F0F5FF;
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--r-md) var(--r-md) 0;
      color: #1E40AF; letter-spacing: 0.02em; line-height: 1.6;
    }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 16 · LAYOUT UTILITIES
       ═══════════════════════════════════════════════════════════════════ */
    .g2   { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
    .g3   { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 13px; }
    .g4   { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 11px; }
    .stk  { display: flex; flex-direction: column; }
    .g-4  { gap: 4px; }  .g-6  { gap: 6px; }  .g-8  { gap: 8px; }
    .g-10 { gap: 10px; } .g-12 { gap: 12px; } .g-16 { gap: 16px; }
    .g-18 { gap: 18px; } .g-20 { gap: 20px; }
    .row  { display: flex; align-items: center; }
    .row-between { justify-content: space-between; }
    .spacer { flex: 1; }
    .mt-4  { margin-top: 4px; }  .mt-6  { margin-top: 6px; }
    .mt-8  { margin-top: 8px; }  .mt-10 { margin-top: 10px; }
    .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; }
    .mb-6  { margin-bottom: 6px; } .mb-8  { margin-bottom: 8px; }
    .mb-10 { margin-bottom: 10px; }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 17 · TITLE SLIDE
       ═══════════════════════════════════════════════════════════════════ */
    .title-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; min-height: calc(100vh - 180px); padding: 20px;
    }
    .title-kicker {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 20px;
    }
    .title-kicker::before, .title-kicker::after {
      content: ''; width: 28px; height: 1px; background: var(--accent-border);
    }
    .title-main  { font-size: 32px; font-weight: 800; color: var(--text-1); line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 10px; }
    .title-sub   { font-size: 16px; font-weight: 400; color: var(--text-3); margin-bottom: 7px; }
    .title-tag   { font-size: 13px; color: var(--text-4); margin-bottom: 38px; }
    .title-rule  { width: 360px; height: 1px; background: var(--border); margin-bottom: 30px; }
    .title-meta  { display: grid; grid-template-columns: repeat(3,1fr); gap: 36px; max-width: 560px; }
    .meta-lbl    { font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-4); margin-bottom: 5px; }
    .meta-val    { font-size: 12.5px; color: var(--text-2); }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 18 · CHART CONTAINERS
       ═══════════════════════════════════════════════════════════════════ */
    .chart-wrap { width: 100%; }
    .chart-wrap svg { width: 100%; height: auto; display: block; }
    .chart-note { font-size: 11px; color: var(--text-4); margin-top: 7px; font-style: italic; }
    .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 9px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-3); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE 19 · SCROLLBAR & PRINT
       ═══════════════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--fill-md); border-radius: 3px; }

    @media print {
      .bottom-nav, .top-bar, .progress-track { display: none !important; }
      body { height: auto; overflow: visible; background: #fff; }
      .shell { height: auto; }
      .slides-container { overflow: visible; height: auto; background: #fff; padding: 0; }
      .slide { display: block !important; animation: none !important; page-break-after: always;
               min-height: 0; box-shadow: none; border: none; max-width: 100%; border-radius: 0; }
    }
  </style>
</head>
<body>

  <div class="shell">

    <header class="top-bar">
      <span id="part-badge" class="pill pill-neutral"></span>
      <span id="slide-counter" class="top-bar-counter"></span>
    </header>

    <div class="progress-track">
      <div id="progress-fill" class="progress-fill" style="width:0%"></div>
    </div>

    <main id="slides" class="slides-container" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Slide navigation">
      <button id="btn-prev" class="nav-btn">&#8592; Previous</button>
      <div id="dot-nav" class="dot-nav" role="tablist"></div>
      <button id="btn-next" class="nav-btn">Next &#8594;</button>
    </nav>

  </div>

  <script>
  (function () {
    'use strict';

    /* ═══════════════════════════════════════════════════════════════════
       MODULE A · SVG CHART ENGINE  (light-mode palette)
       ═══════════════════════════════════════════════════════════════════ */
    const CHART_COLORS = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#14B8A6','#EC4899'];
    const TONE_MAP = { info:'#3B82F6', success:'#10B981', warning:'#F59E0B', danger:'#EF4444', neutral:'#94A3B8' };

    // SVG style constants for light-mode charts
    const LM = {
      grid:   'rgba(15,23,42,0.07)',
      axis:   'rgba(15,23,42,0.15)',
      label:  '#94A3B8',
      valLbl: '#475569',
    };

    function niceMax(v) {
      if (v <= 0) return 1;
      const mag = Math.pow(10, Math.floor(Math.log10(v)));
      return Math.ceil(v / mag) * mag;
    }

    function barSVG(cats, data, suffix, svgH) {
      const W = 480, H = svgH || 210;
      const P = { t: 20, r: 16, b: 50, l: 44 };
      const CW = W - P.l - P.r, CH = H - P.t - P.b;
      const maxV = niceMax(Math.max(...data) * 1.12);
      const n = cats.length;
      const slot = CW / n;
      const bw = Math.min(Math.max(slot * 0.54, 10), 68);
      let s = '';

      // Grid & y-labels
      [0, 0.25, 0.5, 0.75, 1.0].forEach(f => {
        const v = maxV * f, y = P.t + CH - f * CH;
        s += `<line x1="${P.l}" y1="${y.toFixed(1)}" x2="${P.l+CW}" y2="${y.toFixed(1)}" stroke="${LM.grid}" stroke-width="1"/>`;
        const lbl = v < 1 ? v.toFixed(1) : Math.round(v);
        s += `<text x="${P.l-4}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="${LM.label}" font-size="10" font-family="system-ui">${lbl}${suffix}</text>`;
      });

      // Bars
      cats.forEach((cat, i) => {
        const v = data[i];
        const bh = (v / maxV) * CH;
        const bx = P.l + i * slot + (slot - bw) / 2;
        const by = P.t + CH - bh;
        const col = CHART_COLORS[i % CHART_COLORS.length];
        s += `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}" opacity="0.88" rx="4"/>`;
        s += `<text x="${(bx+bw/2).toFixed(1)}" y="${(by-5).toFixed(1)}" text-anchor="middle" fill="${LM.valLbl}" font-size="11" font-weight="600" font-family="system-ui">${v}${suffix}</text>`;

        // X-label — split on spaces
        const words = cat.split(' ');
        const mid = Math.ceil(words.length / 2);
        if (words.length <= 2) {
          s += `<text x="${(bx+bw/2).toFixed(1)}" y="${(P.t+CH+16).toFixed(1)}" text-anchor="middle" fill="${LM.label}" font-size="11" font-family="system-ui">${cat}</text>`;
        } else {
          s += `<text x="${(bx+bw/2).toFixed(1)}" y="${(P.t+CH+14).toFixed(1)}" text-anchor="middle" fill="${LM.label}" font-size="10.5" font-family="system-ui">${words.slice(0,mid).join(' ')}</text>`;
          s += `<text x="${(bx+bw/2).toFixed(1)}" y="${(P.t+CH+27).toFixed(1)}" text-anchor="middle" fill="${LM.label}" font-size="10.5" font-family="system-ui">${words.slice(mid).join(' ')}</text>`;
        }
      });
      s += `<line x1="${P.l}" y1="${P.t+CH}" x2="${P.l+CW}" y2="${P.t+CH}" stroke="${LM.axis}" stroke-width="1"/>`;
      return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${s}</svg>`;
    }

    function lineSVG(cats, series, suffix, svgH) {
      const W = 480, H = svgH || 210;
      const P = { t: 20, r: 16, b: 48, l: 48 };
      const CW = W - P.l - P.r, CH = H - P.t - P.b;
      const n = cats.length;
      const xStep = CW / Math.max(n - 1, 1);

      const allV = series.flatMap(s => s.data);
      const rawMin = Math.min(...allV), rawMax = Math.max(...allV);
      const pad = (rawMax - rawMin) * 0.13 || 1;
      const yMin = rawMin - pad, yMax = rawMax + pad, yR = yMax - yMin;

      function xAt(i) { return P.l + i * xStep; }
      function yAt(v) { return P.t + CH - ((v - yMin) / yR) * CH; }

      let s = '';

      // Grid & y-axis
      for (let t = 0; t <= 5; t++) {
        const v = yMin + (yR / 5) * t, y = yAt(v);
        s += `<line x1="${P.l}" y1="${y.toFixed(1)}" x2="${P.l+CW}" y2="${y.toFixed(1)}" stroke="${LM.grid}" stroke-width="1"/>`;
        s += `<text x="${P.l-4}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="${LM.label}" font-size="10" font-family="system-ui">${Math.round(v*10)/10}${suffix}</text>`;
      }

      // X-labels
      cats.forEach((cat, i) => {
        s += `<text x="${xAt(i).toFixed(1)}" y="${(P.t+CH+16).toFixed(1)}" text-anchor="middle" fill="${LM.label}" font-size="10" font-family="system-ui">${cat}</text>`;
      });

      let legendHTML = '';
      series.forEach((sr, si) => {
        const col = sr.color || TONE_MAP[sr.tone] || CHART_COLORS[si % CHART_COLORS.length];
        const pts = sr.data.map((v, i) => `${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`);
        const fX = xAt(0), lX = xAt(sr.data.length-1), baseY = P.t + CH;
        const areaD = `M ${pts[0]} ${pts.slice(1).map(p=>'L '+p).join(' ')} L ${lX.toFixed(1)},${baseY} L ${fX.toFixed(1)},${baseY} Z`;
        s += `<path d="${areaD}" fill="${col}" opacity="0.09"/>`;
        s += `<polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
        sr.data.forEach((v, i) => {
          s += `<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(v).toFixed(1)}" r="3.5" fill="${col}" stroke="white" stroke-width="1.5"/>`;
        });
        legendHTML += `<span class="legend-item"><span class="legend-dot" style="background:${col}"></span>${sr.name}</span>`;
      });

      s += `<line x1="${P.l}" y1="${P.t+CH}" x2="${P.l+CW}" y2="${P.t+CH}" stroke="${LM.axis}" stroke-width="1"/>`;
      const leg = series.length > 1 ? `<div class="legend">${legendHTML}</div>` : '';
      return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${s}</svg>${leg}</div>`;
    }

       ═══════════════════════════════════════════════════════════════════ */
    let current = 0;

    const $ = id => document.getElementById(id);
    const container  = $('slides');
    const partBadge  = $('part-badge');
    const slideCount = $('slide-counter');
    const progFill   = $('progress-fill');
    const dotNav     = $('dot-nav');
    const btnPrev    = $('btn-prev');
    const btnNext    = $('btn-next');

    function init() {
      SLIDES.forEach((s, i) => {
        const section = document.createElement('section');
        section.className = 'slide';
        section.setAttribute('aria-label', `Slide ${i+1}: ${s.title}`);
        section.innerHTML = s.html();
        container.appendChild(section);

        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.setAttribute('role', 'tab');
        dot.title = `${i+1}. ${s.title}`;
        dot.addEventListener('click', () => goto(i));
        dotNav.appendChild(dot);
      });

      goto(0);
    }

    function goto(next) {
      const slides = container.querySelectorAll('.slide');
      const dots   = dotNav.querySelectorAll('.dot');

      slides[current].classList.remove('active');
      current = Math.max(0, Math.min(next, SLIDES.length - 1));
      slides[current].classList.add('active');
      container.scrollTop = 0;

      const s = SLIDES[current];
      partBadge.className  = `pill pill-${s.partTone}`;
      partBadge.innerHTML  = s.part;
      slideCount.textContent = `${current + 1} / ${SLIDES.length}`;
      progFill.style.width = `${((current + 1) / SLIDES.length) * 100}%`;
      dots.forEach((d, i) => d.classList.toggle('active', i === current));
      btnPrev.disabled = current === 0;
      btnNext.disabled = current === SLIDES.length - 1;
    }

    /* ═══════════════════════════════════════════════════════════════════
       MODULE E · EVENT LISTENERS
       ═══════════════════════════════════════════════════════════════════ */
    btnPrev.addEventListener('click', () => goto(current - 1));
    btnNext.addEventListener('click', () => goto(current + 1));

    document.addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goto(current + 1); }
      if (e.key === 'ArrowLeft')                    { e.preventDefault(); goto(current - 1); }
      if (e.key === 'Home')                         { e.preventDefault(); goto(0); }
      if (e.key === 'End')                          { e.preventDefault(); goto(SLIDES.length - 1); }
    });

    /* ═══════════════════════════════════════════════════════════════════
       MODULE F · INIT
       ═══════════════════════════════════════════════════════════════════ */
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
