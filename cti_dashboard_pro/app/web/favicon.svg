<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="gradAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Circle for dark mode contrast -->
  <circle cx="50" cy="50" r="48" fill="#0f172a" />
  
  <!-- Cooling Tower Base Shape -->
  <path d="M 35,25 C 42,40 42,65 25,80 L 75,80 C 58,65 58,40 65,25 Z" fill="url(#grad)" />
  
  <!-- Inner lines for depth -->
  <path d="M 40,25 C 46,40 46,65 30,80" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
  <path d="M 60,25 C 54,40 54,65 70,80" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Abstract Data Curve (Like Performance Curve) intersecting the tower -->
  <path d="M 15,65 Q 45,30 85,50" fill="none" stroke="url(#gradAccent)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Data Nodes -->
  <circle cx="15" cy="65" r="4.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="48" cy="43.5" r="4.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="85" cy="50" r="4.5" fill="#ffffff" filter="url(#glow)"/>
  
  <!-- Plume / Evaporation Vapor lines -->
  <path d="M 40,25 Q 45,15 35,8" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M 50,25 Q 55,10 60,12" fill="none" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M 60,25 Q 65,18 50,8" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
</svg>
